  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase image prefix
        # Docker registry names must be lowercase. github.repository_owner
        # preserves original casing (e.g. mindoraRwanda), so we force it here.
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=${{ env.REGISTRY }}/${OWNER}" >> $GITHUB_ENV

