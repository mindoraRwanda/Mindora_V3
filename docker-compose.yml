services:

  postgres:
    image: postgres:17
    container_name: mindora-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindora

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: mindora-redis

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management

    container_name: mindora-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: